<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard | Cars Dealership</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <div class="dashboard-wrapper">
        <!-- Adminto Sidebar -->
        <aside class="dashboard-sidebar">
            <a href="/" class="navbar-brand mb-5 px-3 d-block" style="text-decoration: none;">Cars<span>Dealership</span></a>
            
            <div class="sidebar-user">
                <img src="/static/images/pexels-introspectivedsgn-4077265.jpg" class="sidebar-avatar" alt="Buyer" style="object-fit: cover;">
                <h6 id="sidebar-username" class="font-weight-bold mb-1">Buyer User</h6>
                <p class="text-muted small font-weight-bold mb-3">Premium Member</p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="/" class="btn btn-sm btn-light rounded-circle shadow-sm" title="Go Home" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-home text-primary"></i>
                    </a>
                    <i class="fas fa-power-off text-danger ml-2" style="cursor:pointer; font-size: 1.2rem; align-self: center;" onclick="logout()" title="Logout"></i>
                </div>
            </div>

            <nav class="sidebar-nav">
                <p class="small text-muted font-weight-bold px-3 mb-2 text-uppercase">Garage</p>
                <a href="/buyer-dashboard/" class="sidebar-link active">
                    <i class="fas fa-car"></i>
                    <span>My Garage</span>
                    <span class="badge badge-primary ml-auto liked-badge">0</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i class="far fa-heart"></i>
                    <span>Favorites</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i class="fas fa-history"></i>
                    <span>View History</span>
                </a>
                
                <p class="small text-muted font-weight-bold px-3 mt-4 mb-2 text-uppercase">Account</p>
                <a href="#" class="sidebar-link">
                    <i class="far fa-star"></i>
                    <span>My Reviews</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i class="far fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <a href="/" class="sidebar-link mt-4" style="background: var(--accent-light); color: var(--accent);">
                    <i class="fas fa-search"></i>
                    <span>Find more cars</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <h4 class="font-weight-bold mb-0">My Garage</h4>
                <div class="d-flex align-items-center">
                    <div class="search-wrapper py-2 px-3 m-0 shadow-none border" style="max-width: 250px; background: #EEEFF1;">
                        <input type="text" placeholder="Search saved..." class="small bg-transparent">
                        <i class="fas fa-search text-muted small"></i>
                    </div>
                    <div class="ml-4 d-flex align-items-center">
                        <i class="far fa-bell text-muted position-relative mr-4">
                            <span class="badge badge-danger position-absolute" style="top:-8px; right:-8px; font-size: 0.5rem; padding: 2px 4px;">2</span>
                        </i>
                        <img src="/static/images/pexels-introspectivedsgn-4077265.jpg" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;" alt="User">
                        <span id="nav-username" class="small font-weight-bold ml-2">Buyer</span>
                        <i class="fas fa-chevron-down small text-muted ml-2"></i>
                    </div>
                </div>
            </header>

            <!-- Stat Grid -->
            <div class="row mb-5">
                <div class="col-md-4">
                    <div class="dash-card">
                        <div class="dash-card-title">Saved Vehicles</div>
                        <div class="d-flex align-items-center justify-content-between">
                            <h3 class="dash-value mb-0 liked-badge">0</h3>
                            <div class="bg-primary-light p-3 rounded-circle text-primary">
                                <i class="fas fa-heart fa-lg"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="dash-card">
                        <div class="dash-card-title">Active Inquiries</div>
                        <div class="d-flex align-items-center justify-content-between">
                            <h3 class="dash-value mb-0">0</h3>
                            <div class="bg-primary-light p-3 rounded-circle text-primary">
                                <i class="fas fa-paper-plane fa-lg"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="dash-card">
                        <div class="dash-card-title">Reviews Written</div>
                        <div class="d-flex align-items-center justify-content-between">
                            <h3 class="dash-value mb-0">0</h3>
                            <div class="bg-primary-light p-3 rounded-circle text-primary">
                                <i class="fas fa-star fa-lg"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <h5 class="font-weight-bold mb-4">Saved Inventory</h5>
            <div id="saved-inventory-list" class="row">
                <!-- Will show cars from localstorage favorites later -->
                <div class="col-12 text-center py-5">
                    <img src="https://illustrations.popsy.co/blue/abstract-art-4.svg" style="width: 200px; opacity: 0.5;" class="mb-4">
                    <h6 class="text-muted">Your garage is empty. Start adding cars!</h6>
                    <a href="/" class="btn btn-primary mt-3">Browse Marketplace</a>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('username');
            const liked = localStorage.getItem('likedCount') || 0;
            if(user) {
                document.getElementById('sidebar-username').innerText = user;
                document.getElementById('nav-username').innerText = user;
            }
            document.querySelectorAll('.liked-badge').forEach(b => b.innerText = liked);
        });

        async function logout() {
            try { await fetch('/djangoapp/logout/'); } catch(e) {}
            localStorage.removeItem('username');
            localStorage.removeItem('userRole');
            window.location.href = '/';
        }
    </script>
</body>
</html>
