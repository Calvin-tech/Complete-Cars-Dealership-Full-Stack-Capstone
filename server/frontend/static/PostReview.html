<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Review | Cars Dealership</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <!-- Consistent Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="/">Cars<span>Dealership</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
                </ul>
                <div class="navbar-nav ml-auto align-items-center" id="nav-auth-section">
                    <a class="nav-link" href="/login/">Log in</a>
                    <a class="btn btn-primary ml-lg-3" href="/register/">Sign up</a>
                </div>
            </div>
        </div>
    </nav>

    <script>
        function updateNavbar() {
            const authSection = document.getElementById('nav-auth-section');
            const user = localStorage.getItem('username');
            const role = localStorage.getItem('userRole');
            
            if (user && user !== "undefined" && user !== "null") {
                authSection.innerHTML = `
                    <div class="nav-icons-group">
                        <a href="#" class="nav-icon-link"><i class="far fa-heart"></i><span class="badge badge-pill badge-primary">2</span></a>
                        <a href="#" class="nav-icon-link"><i class="fas fa-shopping-cart"></i><span class="badge badge-pill badge-primary">0</span></a>
                        <div class="dropdown">
                            <a href="#" class="nav-icon-link dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <i class="far fa-user-circle"></i>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right">
                                <h6 class="dropdown-header">Hello, ${user}</h6>
                                <a id="dashboard-link" class="dropdown-item" href="#"><i class="fas fa-th-large mr-2"></i>Dashboard</a>
                                <a class="dropdown-item" href="#"><i class="fas fa-cog mr-2"></i>Settings</a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item text-danger" href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt mr-2"></i>Logout</a>
                            </div>
                        </div>
                    </div>
                `;
                const dashLink = document.getElementById('dashboard-link');
                if (role === 'admin') dashLink.href = '/admin-dashboard/';
                else if (role === 'dealer') dashLink.href = '/dealer-dashboard/';
                else dashLink.href = '/buyer-dashboard/';
            }
        }
        async function logout() {
            try { await fetch('/djangoapp/logout/'); } catch(e) {}
            localStorage.removeItem('username');
            localStorage.removeItem('userRole');
            window.location.href = '/';
        }
        document.addEventListener('DOMContentLoaded', updateNavbar);
    </script>

    <main class="container py-5">
        <div class="mb-4">
            <a href="javascript:history.back()" class="text-muted font-weight-bold" style="text-decoration: none;">
                <i class="fas fa-arrow-left mr-2"></i>Back
            </a>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4" style="border-radius: 24px;">
                    <div class="mb-4">
                        <h4 style="font-weight: 800;"><i class="fas fa-edit text-primary mr-2"></i>Write a Review</h4>
                        <p class="text-muted small" id="dealer-name-display">Share your experience with <strong>Dealership</strong></p>
                    </div>
                    
                    <form id="reviewForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="x-small font-weight-bold text-muted text-uppercase"><i class="fas fa-car mr-1"></i>Car Make</label>
                                <select class="form-control form-control-sm" id="carMake" style="height: 45px; border-radius: 10px;" required onchange="updateModels()">
                                    <option value="">Select Make</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="x-small font-weight-bold text-muted text-uppercase"><i class="fas fa-list mr-1"></i>Car Model</label>
                                <select class="form-control form-control-sm" id="carModel" style="height: 45px; border-radius: 10px;" required disabled>
                                    <option value="">Select Model</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <label class="x-small font-weight-bold text-muted text-uppercase"><i class="fas fa-calendar-alt mr-1"></i>Purchase Date</label>
                            <input type="date" id="purchaseDate" class="form-control form-control-sm" style="height: 45px; border-radius: 10px;" required>
                        </div>
                        <div class="form-group mb-3">
                            <label class="x-small font-weight-bold text-muted text-uppercase"><i class="fas fa-comment-dots mr-1"></i>Your Review</label>
                            <textarea id="reviewText" class="form-control form-control-sm" rows="3" placeholder="What did you think of the service?" style="padding-top: 0.8rem; border-radius: 10px;" required></textarea>
                        </div>
                        <div class="custom-control custom-checkbox mb-4">
                            <input type="checkbox" class="custom-control-input" id="purchaseCheck">
                            <label class="custom-control-label font-weight-bold x-small text-muted" for="purchaseCheck"><i class="fas fa-check-circle mr-1"></i>I PURCHASED A CAR FROM THIS DEALER</label>
                        </div>
                        <button type="submit" class="btn btn-primary px-4 py-2 font-weight-bold rounded-pill" style="font-size: 0.9rem;"><i class="fas fa-paper-plane mr-2"></i>Submit Review</button>
                    </form>
                    <div id="submitMessage" class="mt-2 x-small font-weight-bold"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center">
        <div class="container">
            <p class="small text-muted mb-0">&copy; 2026 Cars Dealership. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap & jQuery Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let dealerId = "";
        let carData = [];

        async function initPage() {
            const urlPath = window.location.pathname;
            dealerId = urlPath.split('/').filter(p => p !== "").pop();
            
            if (!dealerId || isNaN(dealerId)) {
                alert("Invalid Dealer ID");
                window.location.href = "/";
                return;
            }

            // Fetch Dealer Name
            try {
                const res = await fetch(`/djangoapp/fetchDealer/${dealerId}/`);
                const dealer = await res.json();
                if (dealer) {
                    document.getElementById('dealer-name-display').innerHTML = `Share your experience with <strong>${dealer.full_name}</strong>`;
                }
            } catch(e) { console.error(e); }

            // Fetch Car Makes and Models
            try {
                const res = await fetch('/djangoapp/get_cars/');
                const result = await res.json();
                carData = result.CarModels || [];
                const makeSelect = document.getElementById('carMake');
                const uniqueMakes = [...new Set(carData.map(c => c.CarMake))];
                uniqueMakes.forEach(make => {
                    const opt = document.createElement('option');
                    opt.value = make;
                    opt.innerText = make;
                    makeSelect.appendChild(opt);
                });
            } catch(e) { console.error("Error fetching cars:", e); }
        }

        function updateModels() {
            const make = document.getElementById('carMake').value;
            const modelSelect = document.getElementById('carModel');
            modelSelect.innerHTML = '<option value="">Select Model</option>';
            
            if (!make) {
                modelSelect.disabled = true;
                return;
            }

            const models = carData.filter(c => c.CarMake === make);
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.CarModel;
                opt.innerText = m.CarModel;
                modelSelect.appendChild(opt);
            });
            modelSelect.disabled = false;
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('submitMessage');
            messageDiv.innerText = 'Submitting review...';
            messageDiv.className = 'mt-3 small font-weight-bold text-primary';

            const carModelValue = document.getElementById('carModel').value;
            const carMakeValue = document.getElementById('carMake').value;
            const selectedModel = carData.find(c => c.CarModel === carModelValue && c.CarMake === carMakeValue);

            const data = {
                "name": localStorage.getItem('username') || "Anonymous",
                "dealership": parseInt(dealerId),
                "review": document.getElementById('reviewText').value,
                "purchase": document.getElementById('purchaseCheck').checked,
                "purchase_date": document.getElementById('purchaseDate').value,
                "car_make": carMakeValue,
                "car_model": carModelValue,
                "car_year": selectedModel ? selectedModel.CarYear : 2024
            };

            try {
                const response = await fetch('/djangoapp/add_review/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.status === 200) {
                    messageDiv.className = 'mt-3 small font-weight-bold text-success';
                    messageDiv.innerText = 'Review posted successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = `/dealer/${dealerId}/`;
                    }, 1500);
                } else {
                    messageDiv.className = 'mt-3 small font-weight-bold text-danger';
                    messageDiv.innerText = 'Failed to post review: ' + (result.message || 'Error ' + result.status);
                }
            } catch (err) {
                console.error("Post review error:", err);
                messageDiv.className = 'mt-3 small font-weight-bold text-danger';
                messageDiv.innerText = 'Network error occurred.';
            }
        });

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
