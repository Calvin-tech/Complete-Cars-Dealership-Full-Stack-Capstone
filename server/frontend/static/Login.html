<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Cars Dealership</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <!-- Consistent Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="/">Cars<span>Dealership</span></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
                </ul>
                <div class="navbar-nav ml-auto">
                    <a class="btn btn-primary" href="/register/">Sign up</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="text-center mb-5">
                <h2 style="font-weight: 800;">Welcome Back</h2>
                <p class="text-muted">Enter your details to access your account</p>
            </div>

            <!-- Role Selector -->
            <div class="role-selector" id="roleSelector">
                <button class="role-btn active" onclick="setRole('buyer', this)">Buyer</button>
                <button class="role-btn" onclick="setRole('dealer', this)">Dealer</button>
                <button class="role-btn" onclick="setRole('admin', this)">Admin</button>
            </div>

            <form id="loginForm">
                <div class="form-group mb-4">
                    <label class="small font-weight-bold text-muted text-uppercase">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" style="height: 56px;" required>
                </div>
                <div class="form-group mb-5">
                    <label class="small font-weight-bold text-muted text-uppercase">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" style="height: 56px;" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block py-3">Sign in</button>
            </form>

            <div id="loginMessage" class="mt-3 small font-weight-bold"></div>

            <div class="text-center mt-5">
                <p class="text-muted small">Don't have an account? <a href="/register/" class="text-primary font-weight-bold">Sign up</a></p>
            </div>
        </div>
    </main>

    <footer class="footer bg-white mt-5">
        <div class="container text-center py-4">
            <div class="footer-logo mb-0">Cars<span>Dealership</span></div>
            <p class="text-muted small mt-2">&copy; 2026 Cars Dealership. All rights reserved.</p>
        </div>
    </footer>

    <script>
        let currentRole = 'buyer';
        function setRole(role, btn) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRole = role;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('loginMessage');
            messageDiv.innerText = 'Signing in...';
            
            const data = {
                userName: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/djangoapp/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                console.log("Login API response:", result);
                
                if (response.ok && (result.status === "Authenticated" || result.userName)) {
                    const username = result.userName || result.username;
                    localStorage.setItem('username', username);
                    localStorage.setItem('userRole', currentRole);
                    console.log("Stored username and role in localStorage:", username, currentRole);
                    
                    messageDiv.className = 'mt-3 small font-weight-bold text-success';
                    messageDiv.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        let redirectUrl = '/';
                        if (currentRole === 'admin') redirectUrl = '/admin-dashboard/';
                        else if (currentRole === 'dealer') redirectUrl = '/dealer-dashboard/';
                        else if (currentRole === 'buyer') redirectUrl = '/buyer-dashboard/';
                        window.location.href = redirectUrl;
                    }, 1000);
                } else {
                    messageDiv.className = 'mt-3 small font-weight-bold text-danger';
                    messageDiv.innerText = result.status === 'Failed' ? 'Invalid credentials' : (result.error || 'Login failed');
                }
            } catch (err) {
                messageDiv.className = 'mt-3 small font-weight-bold text-danger';
                messageDiv.innerText = 'Network error occurred';
            }
        });
    </script>
    <!-- Bootstrap & jQuery Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
